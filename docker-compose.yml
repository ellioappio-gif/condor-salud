# ─── Docker Compose ───────────────────────────────────────────
# Usage:
#   docker compose up        → development (with hot reload)
#   docker compose up prod   → production build
#
# Environment variables: create .env from .env.example

services:
  # ── Development ─────────────────────────────────────────────
  dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
    command: npm run dev
    restart: unless-stopped

  # ── Production ──────────────────────────────────────────────
  prod:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - NODE_ENV=production
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

  # ── DCM4CHEE PACS Archive ───────────────────────────────────
  dcm4chee:
    image: dcm4che/dcm4chee-arc-psql:5.31.1
    ports:
      - "8080:8080"   # Web UI
      - "8443:8443"   # HTTPS
      - "11112:11112" # DICOM
      - "2762:2762"   # HL7
    environment:
      - POSTGRES_HOST=dcm4chee-db
      - POSTGRES_DB=pacsdb
      - POSTGRES_USER=pacs
      - POSTGRES_PASSWORD=pacs
      - WILDFLY_ADMIN_USER=admin
      - WILDFLY_ADMIN_PASSWORD=admin
    depends_on:
      - dcm4chee-db
    restart: unless-stopped
    volumes:
      - dcm4chee-data:/opt/wildfly/standalone/data

  dcm4chee-db:
    image: dcm4che/postgres-dcm4chee:15.4-31
    environment:
      - POSTGRES_DB=pacsdb
      - POSTGRES_USER=pacs
      - POSTGRES_PASSWORD=pacs
    restart: unless-stopped
    volumes:
      - dcm4chee-db-data:/var/lib/postgresql/data

volumes:
  dcm4chee-data:
  dcm4chee-db-data:
