# axe DevTools Linter configuration
# https://docs.deque.com/linter/4.0.0/en/axe-linter-rules

rules:
  # Disabled: produces false positives on dynamic JSX expressions
  # like aria-expanded={isOpen} which are valid at runtime but
  # unresolvable at static analysis time.
  aria-valid-attr-value: false
  # Static linter cannot resolve dynamic children rendered by .map()
  # inside role="list" containers — valid at runtime.
  aria-required-children: false
